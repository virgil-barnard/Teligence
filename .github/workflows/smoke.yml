name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t teligence-smoke -f Dockerfile .

      - name: Run smoke tests
        run: docker run --rm -v "${{ github.workspace }}:/app" -w /app teligence-smoke python -m unittest tests.test_smoke
