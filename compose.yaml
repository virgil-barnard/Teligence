services:
  agent:
    build:
      context: ./projects/${PROJ}
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-ubuntu:24.04}
        GH_VERSION: ${GH_VERSION:-2.57.0}
        GLAB_VERSION: ${GLAB_VERSION:-1.46.0}
        OPENCODE_VERSION: ${OPENCODE_VERSION:-}
    image: ${IMAGE_TAG:-agent-${PROJ}:latest}

    # Keep a stable "workstation" container; use `make task` / `make shell` to interact.
    command: ["bash", "-lc", "sleep infinity"]

    init: true
    tty: true
    stdin_open: true
    working_dir: /workspace

    # Hardening-ish defaults; relax per-project in projects/<proj>/compose.yaml if needed.
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp

    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    environment:
      HOME: /tmp/home
      WORKSPACE: /workspace
      CONFIG_DIR: /run/configs

      # OpenCode config override
      OPENCODE_CONFIG: /run/configs/opencode/opencode.jsonc
      OPENCODE_DISABLE_AUTOUPDATE: "1"

    env_file:
      - path: ./projects/${PROJ}/project.env
        required: true

    volumes:
      - type: bind
        source: ./projects/${PROJ}/workspace
        target: /workspace
      - type: bind
        source: ./configs/opencode
        target: /run/configs/opencode
        read_only: true

    # Compose secrets mount at /run/secrets/<secret_name>
    secrets:
      - git_env
      - github_env
      - glab_env
      - llm_env

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    restart: unless-stopped

secrets:
  git_env:
    file: ./configs/git/git.env
  github_env:
    file: ./configs/github/github.env
  glab_env:
    file: ./configs/glab/glab.env
  llm_env:
    file: ./configs/llm/llm.env

volumes:
  ollama_data:
